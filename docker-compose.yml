# auralis production stack — Supabase-style: infra as daemons here, the fleet/MCP stays on the host
# (it needs your Claude auth + the target repo's filesystem) pointed at ORACLE_API_URL=http://localhost:47778.
# Ports bind to 127.0.0.1 only; set ORACLE_TOKEN (in .env) to require a bearer on every API call.
# Managed by the `auralis` CLI: start / stop / status / logs / doctor.
services:
  oracle:
    build:
      context: .
      dockerfile: docker/Dockerfile.oracle
    ports:
      - "127.0.0.1:47778:47778"
    volumes:
      # Bind mount, not a named volume: the brain stays greppable/backupable from the host, and the
      # host-side fleet's timing.jsonl stays readable by the studio's Timing tab.
      - ./.auralis-out:/app/.auralis-out
    # Secrets live in .env.oracle (gitignored) — NOT the auto-loaded .env, because Bun auto-loads .env into
    # every `bun run oracle-lite/server.ts` (test/bench scratch oracles included), which would make them
    # demand auth their clients don't send. required:false so a dev without the file still boots (auth off).
    env_file:
      - path: .env.oracle
        required: false
    # ORACLE_ALLOW_RESET deliberately NOT set — no reset route in production.
    restart: unless-stopped

  studio:
    build:
      context: .
      dockerfile: docker/Dockerfile.studio
    ports:
      - "127.0.0.1:47780:80"
    # nginx injects the oracle token on the /api proxy hop (see docker/nginx.conf). ORACLE_TOKEN comes from
    # .env.oracle; the FILTER limits envsubst to that one var so nginx's own $host/$uri are left intact.
    env_file:
      - path: .env.oracle
        required: false
    environment:
      - NGINX_ENVSUBST_FILTER=ORACLE_TOKEN
    depends_on:
      oracle:
        condition: service_healthy
    restart: unless-stopped

  # -- opt-in profiles ---------------------------------------------------------------------------------
  # Share the studio publicly (explicit choice — this exposes your brain's data):
  #   auralis start --share   (or: docker compose --profile share up -d)
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://studio:80
    depends_on:
      studio:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["share"]
