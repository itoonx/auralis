# studio: static SPA + same-origin /api proxy to the oracle service (compose network name "oracle").
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA — any unknown path falls back to the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Same-origin API, exactly like the vite dev proxy — the dashboard code needs no environment switch.
  location /api/ {
    proxy_pass http://oracle:47778;
    proxy_set_header Host $host;
    # The SPA is anonymous but the oracle now requires auth. Inject the token on the proxied hop only, so the
    # browser never receives it. ${ORACLE_TOKEN} is filled at container start by the nginx image's envsubst
    # (NGINX_ENVSUBST_FILTER=ORACLE_TOKEN, value from .env.oracle). Empty token → oracle 401 (dev auth-off ok).
    proxy_set_header Authorization "Bearer ${ORACLE_TOKEN}";
    proxy_read_timeout 30s;
  }
}
